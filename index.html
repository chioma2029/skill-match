<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Skill Match</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <h1>Skill Match</h1>
        </header>
        <main>
            <section id="skills">
                <h2>Your Skills</h2>
                <ul id="skill-list">
                    <!-- User skills will be dynamically added here -->
                </ul>
                <input type="text" id="new-skill" placeholder="Add a new skill">
                <button id="add-skill">Add Skill</button>
            </section>
            <section id="job-matches">
                <h2>Job Matches</h2>
                <ul id="job-list">
                    <!-- Job matches will be dynamically added here -->
                </ul>
            </section>
        </main>
        <script src="script.js"></script>
